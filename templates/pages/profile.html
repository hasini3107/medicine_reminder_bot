<!-- ===== PROFILE PAGE ===== -->
<section class="page" id="page-profile">
    <div class="page-title-row">
        <div>
            <h1 class="page-h1">Profile</h1>
            <p class="page-sub">Manage your personal health profile</p>
        </div>
        <button class="primary-btn" onclick="saveProfile()"><i class="fa-solid fa-save"></i> Save Changes</button>
    </div>
    <div class="profile-layout">
        <div class="card profile-card">
            <div class="profile-avatar-big" id="profile-avatar">U</div>
            <h2 class="profile-name" id="profile-display-name">User</h2>
            <p class="profile-email" id="profile-display-email">—</p>
            <div class="profile-badges">
                <span class="badge-chip green">Active User</span>
                <span class="badge-chip blue" id="profile-med-count">0 Medicines</span>
            </div>
        </div>
        <div class="card profile-form-card">
            <h3>Personal Information</h3>
            <div class="form-row">
                <div class="form-group"><label>Full Name</label><input type="text" placeholder="Enter your full name" id="profile-name"></div>
                <div class="form-group"><label>Age</label><input type="number" placeholder="Age" id="profile-age"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Email</label><input type="email" placeholder="Enter your email" id="profile-email"></div>
                <div class="form-group"><label>Phone</label><input type="tel" placeholder="+91 00000 00000" id="profile-phone"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Blood Group</label>
                    <select id="profile-blood"><option value="">Select</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>O+</option><option>O-</option><option>AB+</option><option>AB-</option></select>
                </div>
                <div class="form-group"><label>Doctor Name</label><input type="text" placeholder="Dr. Name" id="profile-doctor"></div>
            </div>
            <div class="form-group"><label>Medical Conditions</label><input type="text" placeholder="e.g. Diabetes, Hypertension" id="profile-conditions"></div>
            <div class="form-group"><label>Allergies</label><input type="text" placeholder="e.g. Penicillin" id="profile-allergies"></div>
        </div>
    </div>
</section>
